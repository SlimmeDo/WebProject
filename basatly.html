<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basatly - Smart Study Planner</title>

    <style>
        :root {
            --primary: #00c6ff;
            --secondary: #0072ff;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --danger: #ff4b2b;
            --success: #00b09b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(15, 32, 39, 0.85), rgba(32, 58, 67, 0.85), rgba(44, 83, 100, 0.85)),
                url('https://images.unsplash.com/photo-1434030216411-0b793f4b4173?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center center/cover no-repeat fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        nav h1 {
            font-size: 1.5rem;
            margin: 0;
        }

        nav button {
            width: auto;
            margin: 0;
            padding: 8px 16px;
            background: var(--danger);
        }

        .view {
            display: none;
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        #dashboard-view {
            max-width: 800px;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-container,
        .large-glass-container {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .large-glass-container {
            padding: 40px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        h2,
        h3 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        input {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid var(--glass-border);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--primary);
        }

        button {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.4);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 0, 0, 0.3);
        }

        .stat-card h4 {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .subject-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            text-align: left;
            border-left: 4px solid var(--primary);
        }

        .subject-box strong {
            display: block;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .error-msg {
            color: #ffb8b8;
            font-size: 0.9rem;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>

<body>

    <nav id="navbar" style="display: none;">
        <h1>📚 Basatly</h1>
        <button onclick="logout()">Log Out</button>
    </nav>

    <!-- LOGIN/REGISTER VIEW -->
    <div id="login-view" class="view active">
        <div class="glass-container">
            <h2>Welcome to Basatly</h2>
            <p style="margin-bottom: 20px; color: #ccc;">Your smart study companion.</p>

            <div id="login-err" class="error-msg"></div>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button type="button" onclick="login()">Login</button>
            <button type="button" class="secondary" onclick="register()">Create Account</button>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="view">
        <div class="large-glass-container">
            <h2 id="welcome-text" style="font-size: 2.2rem; margin-bottom: 10px;">Hello, User!</h2>
            <p style="color: #ddd; margin-bottom: 30px; font-size: 1.1rem;">Your learning journey snapshot.</p>

            <div class="stats-grid">
                <div class="stat-card">
                    <h4>🔥 Streak</h4>
                    <div class="value" id="streak-val">0</div>
                </div>
                <div class="stat-card">
                    <h4>⭐ Score</h4>
                    <div class="value" id="score-val">0</div>
                </div>
                <div class="stat-card" id="timer-card" style="display: none;">
                    <h4 style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Plan Time Left
                    </h4>
                    <div class="value" id="timer-val" style="font-size: 1.5rem; color: #ffeb3b; margin-top: 5px;">
                        --:--:--</div>
                </div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: center; margin-bottom: 30px;">
                <button onclick="showView('study-view')" id="btn-study"
                    style="font-size: 1.1rem; padding: 15px; max-width: 300px;">📖 Start Study Session</button>
                <button class="secondary" onclick="showView('setup-view')"
                    style="font-size: 1.1rem; padding: 15px; max-width: 300px;">⚙️ Manage Study Plan</button>
            </div>

            <h3
                style="margin-top: 20px; text-align: left; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">
                Your Active Plan</h3>
            <div id="dashboard-plan"></div>
        </div>
    </div>

    <!-- SETUP PLAN VIEW -->
    <div id="setup-view" class="view">
        <div class="glass-container">
            <h2>Manage Study Plan</h2>

            <h3>Add New Subject</h3>
            <input id="subjectName" placeholder="Subject name (e.g. Math)">
            <input id="chapters" placeholder="Chapters (e.g. ch1,ch2)">
            <input id="difficulty" type="number" min="1" max="5" placeholder="Difficulty (1-5)">
            <button onclick="addSubject()">Add Subject</button>

            <h3 style="margin-top:20px;">Time Info</h3>
            <input id="hours" type="number" placeholder="Hours per day">
            <input id="days" type="number" placeholder="Number of days">

            <button style="background: var(--success);" onclick="savePlan()">Save Plan & Return</button>
            <button class="secondary" onclick="showView('dashboard-view')">Cancel</button>

            <h3 style="margin-top: 20px;">Current Subjects</h3>
            <div id="setup-subjects-list"></div>
        </div>
    </div>

    <!-- STUDY SESSION VIEW -->
    <div id="study-view" class="view">
        <div class="glass-container">
            <h2>Study Session</h2>
            <p style="margin-bottom: 20px; color: #ccc;">What did you finish today?</p>

            <div id="study-subjects-list"></div>

            <button class="secondary" style="margin-top:20px;" onclick="showView('dashboard-view')">Back to
                Dashboard</button>
        </div>
    </div>

    <script>
        // Data Structure
        let users = {};
        try {
            const lData = localStorage.getItem('basatly_users');
            if (lData) users = JSON.parse(lData);
        } catch (e) {
            users = {};
            console.error("Local storage parse error:", e);
        }
        let currentUser = localStorage.getItem('basatly_currentUser') || null;

        let countdownInterval;

        // Current temporary data for setup
        let tempSubjects = [];

        // App Initialization
        window.onload = () => {
            if (currentUser && users[currentUser]) {
                checkStreak();
                showDashboard();
            } else {
                showView('login-view');
            }
        };

        function saveData() {
            localStorage.setItem('basatly_users', JSON.stringify(users));
        }

        // Navigation
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');

            if (countdownInterval) clearInterval(countdownInterval);

            const navbar = document.getElementById('navbar');
            if (viewId === 'login-view') {
                navbar.style.display = 'none';
            } else {
                navbar.style.display = 'flex';
            }

            // View-specific initialization
            if (viewId === 'dashboard-view') renderDashboard();
            if (viewId === 'setup-view') renderSetup();
            if (viewId === 'study-view') renderStudySession();
        }

        // Authentication
        function showError(msg) {
            const err = document.getElementById('login-err');
            err.innerText = msg;
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
            if (!err.offsetHeight) alert(msg); // fallback alerting
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (!user || !pass) return showError("Please fill all fields");

            if (users[user] && users[user].password === pass) {
                currentUser = user;
                localStorage.setItem('basatly_currentUser', user);
                document.getElementById('username').value = "";
                document.getElementById('password').value = "";
                checkStreak();
                showDashboard();
            } else {
                showError("Invalid username or password");
            }
        }

        function register() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if (!user || !pass) return showError("Please fill all fields");
            if (users[user]) return showError("Username already exists");

            users[user] = {
                password: pass,
                score: 0,
                streak: 0,
                lastLoginDate: getTodayString(),
                subjects: [],
                hours: 0,
                days: 0
            };

            saveData();
            currentUser = user;
            localStorage.setItem('basatly_currentUser', user);

            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            showView('setup-view'); // force new user to setup
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('basatly_currentUser');
            showView('login-view');
        }

        // Streak Mechanism
        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        function getYesterdayString() {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
        }

        function checkStreak() {
            const u = users[currentUser];
            if (!u) return;

            const today = getTodayString();
            const yesterday = getYesterdayString();

            if (u.lastLoginDate === yesterday) {
                // Keep streak going; we don't increase it just by logging in, 
                // but we update lastLoginDate so it's not lost.
                u.lastLoginDate = today;
            } else if (u.lastLoginDate !== today) {
                // Missed a day or more
                u.streak = 0;
                u.lastLoginDate = today;
            }
            saveData();
        }

        function increaseStreakAndScore() {
            const u = users[currentUser];
            if (!u.hasStudiedToday) {
                // Note: user must click a thing in the session to get streak bonus
                // we'll track 'lastStudiedDate' properly inside the study function
            }
        }

        // Dashboard
        function showDashboard() {
            renderDashboard();
            showView('dashboard-view');
        }

        function renderDashboard() {
            const u = users[currentUser];
            document.getElementById('welcome-text').innerText = `Hello, ${currentUser}!`;
            document.getElementById('streak-val').innerText = u.streak;
            document.getElementById('score-val').innerText = u.score;

            const planDiv = document.getElementById('dashboard-plan');
            const timerCard = document.getElementById('timer-card');

            if (u.subjects.length === 0) {
                planDiv.innerHTML = "<p style='color:#ccc;'>You haven't set up a plan yet.</p>";
                document.getElementById('btn-study').style.display = 'none';
                timerCard.style.display = 'none';
            } else {
                document.getElementById('btn-study').style.display = 'block';
                planDiv.innerHTML = "";

                if (u.planEndDate) {
                    timerCard.style.display = 'block';
                    startTimer(u.planEndDate);
                } else if (u.days > 0) {
                    // Backfill for legacy plans
                    u.planStartDate = new Date().getTime();
                    u.planEndDate = new Date().getTime() + (u.days * 24 * 60 * 60 * 1000);
                    saveData();
                    timerCard.style.display = 'block';
                    startTimer(u.planEndDate);
                } else {
                    timerCard.style.display = 'none';
                }

                // Generative plan calculation (from old logic)
                let totalDifficulty = u.subjects.reduce((sum, s) => sum + s.difficulty, 0);
                let totalHours = u.hours * u.days;

                u.subjects.forEach(sub => {
                    let subjectHours = (sub.difficulty / totalDifficulty) * totalHours;
                    let hrsChapters = subjectHours / sub.chapters.length;

                    planDiv.innerHTML += `
                        <div class="subject-box">
                            <strong>📘 ${sub.name}</strong>
                            <p style="color:#aaa; font-size: 0.9em; margin-bottom:5px;">Total allocation: ${subjectHours.toFixed(1)} hrs</p>
                            <p style="font-size: 0.9em;">
                                ${sub.chapters.map(c => `• ${c} (${hrsChapters.toFixed(1)}h)`).join('<br>')}
                            </p>
                        </div>
                    `;
                });
            }
        }

        function startTimer(endTimeMillis) {
            function update() {
                const now = new Date().getTime();
                const distance = endTimeMillis - now;

                if (distance < 0) {
                    document.getElementById('timer-val').innerText = "Expired!";
                    document.getElementById('timer-val').style.color = "var(--danger)";
                    if (countdownInterval) clearInterval(countdownInterval);
                    return;
                }

                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);

                let display = "";
                if (d > 0) display += `${d}d `;
                display += `${h}h ${m}m ${s}s`;

                document.getElementById('timer-val').innerText = display;
                document.getElementById('timer-val').style.color = "#ffeb3b";
            }
            if (countdownInterval) clearInterval(countdownInterval);
            update(); // run once immediately
            countdownInterval = setInterval(update, 1000);
        }

        // Setup Plan
        function renderSetup() {
            const u = users[currentUser];
            tempSubjects = [...u.subjects];
            document.getElementById('hours').value = u.hours || "";
            document.getElementById('days').value = u.days || "";
            updateSetupSubjectsList();
        }

        function addSubject() {
            let name = document.getElementById("subjectName").value.trim();
            let chaptersRaw = document.getElementById("chapters").value.trim();
            let chapters = chaptersRaw.split(",").filter(c => c.trim().length > 0);
            let difficulty = parseInt(document.getElementById("difficulty").value);

            if (!name || chapters.length === 0 || !difficulty) return alert("Fill all fields");
            if (tempSubjects.some(s => s.name.toLowerCase() === name.toLowerCase())) {
                return alert("Subject already exists in your plan!");
            }

            tempSubjects.push({ name, chapters, difficulty });

            document.getElementById("subjectName").value = "";
            document.getElementById("chapters").value = "";
            document.getElementById("difficulty").value = "";

            updateSetupSubjectsList();
        }

        function updateSetupSubjectsList() {
            let list = document.getElementById("setup-subjects-list");
            list.innerHTML = "";
            tempSubjects.forEach((sub, idx) => {
                list.innerHTML += `
                    <div class="subject-box" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <strong>${sub.name}</strong>
                            <span style="font-size:0.8rem; color:#aaa;">Diff: ${sub.difficulty} | Chaps: ${sub.chapters.join(", ")}</span>
                        </div>
                        <button style="width: auto; background: var(--danger); padding: 5px 10px; margin: 0;" onclick="removeTempSubject(${idx})">X</button>
                    </div>
                `;
            });
        }

        function removeTempSubject(idx) {
            tempSubjects.splice(idx, 1);
            updateSetupSubjectsList();
        }

        function savePlan() {
            let hours = parseFloat(document.getElementById("hours").value);
            let days = parseInt(document.getElementById("days").value);

            if (tempSubjects.length === 0) return alert("Add at least one subject.");
            if (!hours || !days) return alert("Set hours and days.");

            users[currentUser].subjects = tempSubjects;
            users[currentUser].hours = hours;
            users[currentUser].days = days;

            // start date and end date
            users[currentUser].planStartDate = new Date().getTime();
            users[currentUser].planEndDate = new Date().getTime() + (days * 24 * 60 * 60 * 1000);

            saveData();
            showDashboard();
        }

        // Study Session
        function renderStudySession() {
            const u = users[currentUser];
            let list = document.getElementById('study-subjects-list');
            list.innerHTML = "";

            if (u.subjects.length === 0) {
                list.innerHTML = "<p>No active subjects. Go back and set up a plan.</p>";
                return;
            }

            u.subjects.forEach((sub, subIdx) => {
                list.innerHTML += `
                    <div class="subject-box">
                        <strong>${sub.name}</strong>
                        <div style="margin-top: 10px;">
                            ${sub.chapters.map((ch, chIdx) => `
                                <button style="margin:5px 0; background: rgba(255,255,255,0.2); border: 1px solid var(--glass-border);" 
                                        onclick="finishTask('${sub.name}', '${ch}')">
                                    ✅ Finish ${ch}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }

        function finishTask(subName, chapterName) {
            const u = users[currentUser];
            const today = getTodayString();

            // Score handling
            u.score += 10;

            // Streak handling
            if (u.lastStudiedDate !== today) {
                if (u.lastStudiedDate === getYesterdayString()) {
                    u.streak += 1;
                } else if (!u.lastStudiedDate) {
                    u.streak = 1; // First time ever studying
                } else {
                    u.streak = 1; // Streak reset due to missing yesterday
                }
                u.lastStudiedDate = today;
            }

            // Remove chapter or something?
            // Optional feature: Actually remove the completed chapter from the plan.
            // For now, let's just leave it or you can do it next iteration.

            saveData();

            alert(`Awesome! You gained 10 score points for finishing ${chapterName} in ${subName}.`);
            showDashboard();
        }
    </script>
</body>

</html>
